<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=1.0">
<title>MedZiva Services Banner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 400px;
    display: flex;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  .section {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    padding: 20px 10px;
    transition: all 0.3s;
  }
  .section::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    opacity: 0.12;
    background-size: cover;
    background-position: center;
  }
  .icon-wrap {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 44px;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.15);
    border: 2px solid rgba(255,255,255,0.3);
  }
  .label {
    color: #fff;
    font-size: 15px;
    font-weight: 700;
    text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    letter-spacing: 0.3px;
    line-height: 1.3;
  }
  .sublabel {
    color: rgba(255,255,255,0.85);
    font-size: 10.5px;
    font-weight: 400;
    text-align: center;
    margin-top: 5px;
    text-shadow: 0 1px 4px rgba(0,0,0,0.2);
  }
  /* Section 1: IV Therapy - Teal */
  .s1 { background: linear-gradient(135deg, #0d9488 0%, #0891b2 50%, #0e7490 100%); }
  .s1::after { content:''; position:absolute; top:0; right:0; width:40%; height:100%; background: linear-gradient(to right, transparent, rgba(14,116,144,0.4)); }

  /* Section 2: Lab Test - Blue/Purple */
  .s2 { background: linear-gradient(135deg, #2563eb 0%, #4f46e5 50%, #7c3aed 100%); }
  .s2::before { content:''; position:absolute; top:0; left:0; width:30%; height:100%; background: linear-gradient(to left, transparent, rgba(37,99,235,0.3)); z-index:1; }
  .s2::after { content:''; position:absolute; top:0; right:0; width:30%; height:100%; background: linear-gradient(to right, transparent, rgba(124,58,237,0.3)); z-index:1; }

  /* Section 3: Home Nurse - Emerald */
  .s3 { background: linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%); }
  .s3::before { content:''; position:absolute; top:0; left:0; width:30%; height:100%; background: linear-gradient(to left, transparent, rgba(5,150,105,0.3)); z-index:1; }
  .s3::after { content:''; position:absolute; top:0; right:0; width:30%; height:100%; background: linear-gradient(to right, transparent, rgba(52,211,153,0.3)); z-index:1; }

  /* Section 4: Doctor Visit - Indigo */
  .s4 { background: linear-gradient(135deg, #4338ca 0%, #3b82f6 50%, #2563eb 100%); }
  .s4::before { content:''; position:absolute; top:0; left:0; width:30%; height:100%; background: linear-gradient(to left, transparent, rgba(67,56,202,0.3)); z-index:1; }
  .s4::after { content:''; position:absolute; top:0; right:0; width:30%; height:100%; background: linear-gradient(to right, transparent, rgba(37,99,235,0.3)); z-index:1; }

  /* Section 5: Medical Equipment - Amber/Orange */
  .s5 { background: linear-gradient(135deg, #d97706 0%, #f59e0b 50%, #f97316 100%); }
  .s5::before { content:''; position:absolute; top:0; left:0; width:30%; height:100%; background: linear-gradient(to left, transparent, rgba(217,119,6,0.3)); z-index:1; }
  .s5::after { content:''; position:absolute; top:0; right:0; width:30%; height:100%; background: linear-gradient(to right, transparent, rgba(249,115,22,0.3)); z-index:1; }

  /* Section 6: Pharmacy - Rose/Pink */
  .s6 { background: linear-gradient(135deg, #e11d48 0%, #ec4899 50%, #f43f5e 100%); }
  .s6::before { content:''; position:absolute; top:0; left:0; width:30%; height:100%; background: linear-gradient(to left, transparent, rgba(225,29,72,0.3)); z-index:1; }

  /* Soft blend overlays between sections */
  .blend-right {
    position: absolute;
    top: 0; right: -20px;
    width: 40px;
    height: 100%;
    z-index: 10;
    pointer-events: none;
  }
</style>
</head>
<body>
  <div class="section s1" style="z-index:6;">
    <div class="icon-wrap">💧</div>
    <div class="label">IV Therapy</div>
    <div class="sublabel">Wellness Drips & NAD+</div>
  </div>
  <div class="section s2" style="z-index:5;">
    <div class="icon-wrap">🧪</div>
    <div class="label">Lab Test</div>
    <div class="sublabel">At-Home Collection</div>
  </div>
  <div class="section s3" style="z-index:4;">
    <div class="icon-wrap">👩‍⚕️</div>
    <div class="label">Home Nurse</div>
    <div class="sublabel">Professional Care</div>
  </div>
  <div class="section s4" style="z-index:3;">
    <div class="icon-wrap">👨‍⚕️</div>
    <div class="label">Doctor Visit</div>
    <div class="sublabel">24/7 Consultations</div>
  </div>
  <div class="section s5" style="z-index:2;">
    <div class="icon-wrap">🦽</div>
    <div class="label">Medical Equipment</div>
    <div class="sublabel">Rent & Purchase</div>
  </div>
  <div class="section s6" style="z-index:1;">
    <div class="icon-wrap">💊</div>
    <div class="label">Pharmacy Delivery</div>
    <div class="sublabel">Same-Day Orders</div>
  </div>
</body>
</html>
